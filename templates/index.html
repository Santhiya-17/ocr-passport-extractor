<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR Passport Extractor</title>
    
    <!-- ✅ Bootstrap via CDN (No need to download) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    
    <!-- ✅ Your Custom Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
    <!-- ✅ JavaScript -->
    <script src="{{ url_for('static', filename='script.js') }}" defer></script>
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center">OCR Passport Extractor</h2>
    
    <!-- Drag & Drop Upload Box -->
    <div class="upload-box text-center p-4 border rounded" id="upload-box">
        <input type="file" id="imageUpload" accept="image/*" class="file-input d-none">
        <p class="m-0">Drag & Drop or Click to Upload an Image</p>
    </div>

    <!-- Extract Text Button -->
    <div class="text-center mt-3">
        <button class="btn btn-primary" onclick="uploadImage()">Extract Text</button>
    </div>

    <!-- Progress Bar -->
    <div id="progress-bar" class="progress mt-3" style="display: none;">
        <div class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%;"></div>
    </div>

    <!-- Extracted Data Output -->
    <h3 class="mt-4">Extracted Data:</h3>
    <pre id="output" class="border p-3"></pre>

    <!-- Download Button -->
    <div class="text-center mt-3">
        <a id="downloadLink" class="btn btn-success" style="display: none;" target="_blank">Download Extracted Data</a>
    </div>
</div>

<!-- ✅ Show Warning if JavaScript File is Missing -->
<script>
    window.addEventListener("error", function(e) {
        if (e.target.tagName === "SCRIPT" && e.target.src.includes("script.js")) {
            alert("❌ Error: script.js file is missing in /static/. Please check your project structure.");
        }
    }, true);
</script>

</body>
</html>
